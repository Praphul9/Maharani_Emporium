<!DOCTYPE html>
<html lang="en">
 
<head>
 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<title>Puja Kits | Pujakaro</title>
 
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
 
<style>
 
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
 
body{
background:#0f0f0f;
color:white;
}
 
:root{
--gold:#d4af37;
--card:#171717;
}
 
header{
background:#111;
padding:20px 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}
 
.logo{
font-size:30px;
font-weight:700;
color:var(--gold);
}
 
.back-btn{
color:white;
text-decoration:none;
}
 
.hero{
 
height:450px;
 
background:
linear-gradient(
rgba(0,0,0,.6),
rgba(0,0,0,.6)
),
url('https://images.unsplash.com/photo-1519817650390-64a93db51149?q=80&w=1800');
 
background-size:cover;
background-position:center;
 
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
 
.hero h1{
font-size:60px;
}
 
.container{
width:90%;
max-width:1400px;
margin:auto;
}
 
.section-title{
text-align:center;
padding:80px 0 40px;
}
 
.section-title h2{
color:var(--gold);
font-size:40px;
}
 
.products{
 
display:grid;
 
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
 
gap:30px;
 
padding-bottom:80px;
 
}
 
.product{
 
background:var(--card);
 
border-radius:18px;
 
overflow:hidden;
 
border:
1px solid rgba(212,175,55,.15);
 
}
 
.product img{
 
width:100%;
height:260px;
object-fit:cover;
 
}
 
.product h3{
padding:15px 20px 5px;
}
 
.price{
 
padding:0 20px;
 
color:var(--gold);
 
font-size:22px;
 
font-weight:700;
 
}
 
.product button{
 
margin:20px;
 
width:calc(100% - 40px);
 
padding:14px;
 
border:none;
 
background:var(--gold);
 
font-weight:700;
 
cursor:pointer;
 
border-radius:8px;
 
}
 
footer{
background:#111;
padding:40px;
text-align:center;
}
 
</style>
 
</head>
 
<body>
 
<header>
 
<div class="logo">
PUJAKARO
</div>
 
<a href="index.html" class="back-btn">
← Back To Home
</a>
 
</header>
 
<section class="hero">
 
<h1>
Premium Puja Kits
</h1>
 
</section>
 
<div class="container">
 
<div class="section-title">
 
<h2>
All Puja Kits
</h2>
 
</div>
 
<div class="products">
 
<div class="product">
<img src="https://images.unsplash.com/photo-1604608672516-8e6f6f9b8f33?q=80&w=1200">
<h3>Daily Puja Kit</h3>
<p class="price">₹599</p>
<button>Add To Cart</button>
</div>
 
<div class="product">
<img src="https://images.unsplash.com/photo-1518611012118-696072aa579a?q=80&w=1200">
<h3>Satyanarayan Puja Kit</h3>
<p class="price">₹999</p>
<button>Add To Cart</button>
</div>
 
<div class="product">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200">
<h3>Lakshmi Puja Kit</h3>
<p class="price">₹899</p>
<button>Add To Cart</button>
</div>
 
<div class="product">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200">
<h3>Ganesh Puja Kit</h3>
<p class="price">₹799</p>
<button>Add To Cart</button>
</div>
 
<div class="product">
<img src="https://images.unsplash.com/photo-1489515217757-5fd1be406fef?q=80&w=1200">
<h3>Rudrabhishek Kit</h3>
<p class="price">₹1499</p>
<button>Add To Cart</button>
</div>
 
<div class="product">
<img src="https://images.unsplash.com/photo-1519817914152-22f90e9f7e9d?q=80&w=1200">
<h3>Griha Pravesh Kit</h3>
<p class="price">₹1299</p>
<button>Add To Cart</button>
</div>
 
</div>
 
</div>
 
<footer>
 
© 2026 Pujakaro
 
</footer>
 
</body>
 
</html>
